<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Cable 4 front symbol: crossing lines -->
  <rect x="2" y="2" width="20" height="20" 
        fill="white" 
        stroke="#333" 
        stroke-width="1"/>
  <!-- Left cable crossing over -->
  <path d="M6 8 Q12 4 18 8" 
        fill="none" 
        stroke="#333" 
        stroke-width="2"/>
  <!-- Right cable crossing under -->
  <path d="M6 16 Q12 20 18 16" 
        fill="none" 
        stroke="#333" 
        stroke-width="2" 
        stroke-dasharray="3,2"/>
</svg> 